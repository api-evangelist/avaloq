aid: avaloq
name: Avaloq
description: >-
  Avaloq is a leading provider of wealth management technology and digital banking
  solutions, offering over 7,500 REST API endpoints for financial services integration.
  The platform connects more than 170 financial institutions with 200+ fintech partners
  through Community APIs, Standard Adapters, and certified integrations for banking,
  wealth management, payments, and compliance.
